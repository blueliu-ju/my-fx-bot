<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匯率轉換工具 🐾</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;900&family=Pangolin&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFF9F2; color: #4A4A4A; }
        .font-cute { font-family: 'Pangolin', cursive; }
        .hand-drawn { border: 3px solid #4A4A4A; box-shadow: 6px 6px 0px #4A4A4A; border-radius: 25px; background: white; }
        .result-card { cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
        .result-card:hover { transform: scale(1.05); box-shadow: 10px 10px 0px #4A4A4A; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .illustration-bg { position: absolute; right: -5px; bottom: -5px; font-size: 55px; opacity: 0.12; transform: rotate(-15deg); pointer-events: none; }
        .chip { cursor: pointer; padding: 6px 15px; border: 2px solid #4A4A4A; border-radius: 50px; background: white; font-weight: bold; transition: all 0.2s; }
        .chip.active { background-color: #FFB7B2; box-shadow: 0 4px 0 #4A4A4A; transform: translateY(-2px); }
        .chip.disabled { opacity: 0.3; cursor: not-allowed; }
        #tgSettings { transition: all 0.4s ease; max-height: 0; overflow: hidden; opacity: 0; }
        #tgSettings.show { max-height: 1000px; opacity: 1; margin-top: 1.5rem; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-8 relative">
            <h1 class="text-4xl font-black text-orange-600">✈️📈 匯率轉換小幫手 ✨</h1>
            <div class="mt-3 flex justify-center items-center gap-2">
                <div class="bg-orange-100 px-4 py-1 rounded-xl border-2 border-orange-200 font-cute font-bold text-orange-800">
                    🕒 <span id="lastUpdate">讀取中...</span>
                </div>
                <button onclick="fetchRates()" class="text-orange-500 hover:rotate-180 transition-transform duration-500">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <button onclick="checkAdminPassword()" class="absolute top-0 right-0 text-gray-300 hover:text-orange-500"><i class="fas fa-cog text-3xl"></i></button>
        </div>

        <div class="hand-drawn p-6 mb-10">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3">
                    <span class="text-3xl">💰</span>
                    <input type="number" id="baseAmount" value="100" class="text-3xl font-cute w-32 border-b-4 border-orange-300 focus:outline-none text-center bg-transparent">
                    <select id="baseCurrency" onchange="fetchRates()" class="text-lg font-black border-2 border-gray-800 rounded-full px-3 py-1 bg-yellow-50 outline-none"></select>
                </div>
                <div id="targetChips" class="flex flex-wrap justify-center gap-3"></div>
            </div>

            <div id="tgSettings" class="bg-blue-50 border-4 border-dashed border-blue-200 p-5 rounded-3xl mt-4">
                <h3 class="font-black text-blue-600 mb-3 flex justify-between">
                    <span>⚙️ 管理員模式 </span>
                    <button onclick="document.getElementById('tgSettings').classList.remove('show')" class="text-xs">隱藏</button>
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <input type="password" id="tgToken" placeholder="Bot Token" class="p-2 border-2 border-gray-300 rounded-xl outline-none">
                    <div class="flex gap-2">
                        <input type="text" id="tgChatId" placeholder="Chat ID" class="flex-1 p-2 border-2 border-gray-300 rounded-xl outline-none">
                        <button onclick="saveTGSettings()" class="bg-blue-500 text-white px-3 py-1 rounded-xl text-xs font-bold shadow-sm">儲存測試</button>
                    </div>
                </div>
                <div class="flex flex-wrap items-center gap-3 font-bold bg-white p-4 rounded-2xl border-2 border-blue-100 shadow-sm">
                    <span>📢 1 <span class="baseLabel">TWD</span> 達到</span>
                    <input type="number" id="targetAlertPrice" step="0.0001" placeholder="目標價" class="w-24 p-2 border-2 border-blue-300 rounded-xl text-center outline-none">
                    <select id="alertTargetCurrency" class="p-2 border-2 border-blue-300 rounded-xl bg-white"></select>
                    <button onclick="setAlert()" class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 ml-auto shadow-md transition-all">啟動監控</button>
                </div>
                <div id="historyList" class="mt-6 space-y-3"></div>
            </div>
        </div>

        <div id="resultGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"></div>

        <div id="chartSection" class="hidden hand-drawn p-8 mt-10 relative">
            <button onclick="closeChart()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-2xl"><i class="fas fa-times-circle"></i></button>
            <h3 class="text-2xl font-black text-gray-700 mb-6">📈 <span id="displayChartTitle">趨勢分析</span></h3>
            <div class="h-64 w-full"><canvas id="historyChart"></canvas></div>
        </div><div class="mt-8 text-center text-[10px] text-gray-400">
             | 此網頁為blueliu版權所有 🐘🌧 | 轉載請註明出處 | 
        </div>
    </div>

    <script>
        const themes = { 
            'TWD': { icon: '🇹🇼', deco: '🧋', name: '台幣', color: '#E0F2F1' }, 
            'USD': { icon: '🇺🇸', deco: '🗽', name: '美金', color: '#E3F2FD' }, 
            'JPY': { icon: '🇯🇵', deco: '🗻', name: '日幣', color: '#FFEBEE' }, 
            'KRW': { icon: '🇰🇷', deco: '🎎', name: '韓幣', color: '#F9FBE7' }, 
            'EUR': { icon: '🇪🇺', deco: '🏟️', name: '歐元', color: '#F3E5F5' }, 
            'AUD': { icon: '🇦🇺', deco: '🐨', name: '澳幣', color: '#FFF3E0' }, 
            'HKD': { icon: '🇭🇰', deco: '🏙️', name: '港幣', color: '#EFEBE9' }, 
            'CNY': { icon: '🇨🇳', deco: '🐼', name: '人民幣', color: '#FFEBEE' }, 
            'THB': { icon: '🇹🇭', deco: '🐘', name: '泰銖', color: '#E0F7FA' }, 
            'GBP': { icon: '🇬🇧', deco: '🏰', name: '英鎊', color: '#E8EAF6' } 
        };
       
const countryToCurrency = {
    'TW': 'TWD', 'US': 'USD', 'JP': 'JPY', 'KR': 'KRW', 
    'AU': 'AUD', 'HK': 'HKD', 'CN': 'CNY', 'TH': 'THB', 'GB': 'GBP'
};
       async function init() {
    const baseSelect = document.getElementById('baseCurrency');
    const alertSelect = document.getElementById('alertTargetCurrency');
    
    // 填充下拉選單
    currencies.forEach(c => {
        baseSelect.add(new Option(`${themes[c].icon} ${c}`, c));
        alertSelect.add(new Option(`${themes[c].icon} ${c}`, c));
    });

    // 🌐 自動偵測地區
    try {
        const response = await fetch('https://ipapi.co/json/');
        const ipData = await response.json();
        const detectedCurrency = countryToCurrency[ipData.country_code];
        
        // 如果偵測到的幣別在我們的支援清單內，就切換過去
        if (detectedCurrency && currencies.includes(detectedCurrency)) {
            baseSelect.value = detectedCurrency;
            console.log(`自動偵測：您目前在 ${ipData.country_name}，已切換至 ${detectedCurrency}`);
        } else {
            baseSelect.value = 'TWD'; // 預設台幣
        }
    } catch (e) {
        baseSelect.value = 'TWD'; // 偵測失敗則預設台幣
    }

    // 載入 TG 設定與匯率
    document.getElementById('tgToken').value = localStorage.getItem('tgToken') || '';
    document.getElementById('tgChatId').value = localStorage.getItem('tgChatId') || '';
    
    await fetchRates();
    renderHistory();
    setInterval(fetchRates, 60000); // 每一分鐘檢查一次匯率
}

        async function fetchRates() {
            const from = document.getElementById('baseCurrency').value;
            const token = localStorage.getItem('tgToken'), chatId = localStorage.getItem('tgChatId');
            try {
                const res = await fetch(`https://open.er-api.com/v6/latest/${from}?t=${Date.now()}`);
                const data = await res.json();
                if(data.result === "success") {
                    rates = data.rates;
                    document.getElementById('lastUpdate').innerText = `更新於: ${new Date().toLocaleTimeString()}`;
                    if(token && chatId && alertHistory.length > 0) {
                        alertHistory.forEach((h, idx) => {
                            if(h.from === from) {
                                const cur = rates[h.to];
                                if((h.dir === 'up' && cur >= h.target) || (h.dir === 'down' && cur <= h.target)) {
                                    sendTG(`🔔 匯率達標！\n目前 1 ${from} = ${cur.toFixed(4)} ${h.to}\n您的目標：${h.target}`);
                                    alertHistory.splice(idx, 1);
                                    localStorage.setItem('alertHistory', JSON.stringify(alertHistory));
                                    renderHistory();
                                }
                            }
                        });
                    }
                    updateUI();
                }
            } catch(e) { console.error("抓取失敗", e); }
        }

        function updateUI() {
            const amount = parseFloat(document.getElementById('baseAmount').value) || 0;
            const from = document.getElementById('baseCurrency').value;
            const grid = document.getElementById('resultGrid');
            if (from !== 'TWD' && !selected.includes('TWD')) selected.unshift('TWD');
            grid.innerHTML = '';
            document.querySelectorAll('.baseLabel').forEach(el => el.innerText = from);
            const activeDisplay = selected.filter(to => to !== from).slice(0, 4);
            activeDisplay.forEach(to => {
                const rate = rates[to];
                const card = document.createElement('div');
                card.className = `hand-drawn p-6 text-center result-card`;
                card.style.backgroundColor = themes[to].color;
                card.onclick = () => showChart(from, to);
                card.innerHTML = `<div class="illustration-bg">${themes[to].deco}</div><div class="text-sm font-black text-gray-400 mb-1 z-10 relative">${themes[to].name} ${themes[to].icon}</div><div class="text-3xl font-black text-gray-800 font-cute z-10 relative">${(amount * rate).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</div><div class="text-xs text-gray-400 mt-2 z-10 relative">1 ${from} = ${rate.toFixed(4)} ${to}</div>`;
                grid.appendChild(card);
            });
            renderChips();
        }

        function renderChips() {
            const container = document.getElementById('targetChips'), from = document.getElementById('baseCurrency').value;
            container.innerHTML = '';
            const currentActive = selected.filter(c => c !== from).slice(0, 4);
            currencies.forEach(c => {
                const div = document.createElement('div'), isBase = c === from, isActive = currentActive.includes(c);
                div.className = `chip ${isActive ? 'active' : ''} ${isBase ? 'disabled' : ''}`;
                div.innerHTML = `${themes[c].icon} ${c}`;
                div.onclick = () => {
                    if (isBase) return;
                    if (isActive) selected = selected.filter(x => x !== c);
                    else { if (currentActive.length >= 4) return alert("最多選4個喔！🐾"); selected.push(c); }
                    updateUI();
                };
                container.appendChild(div);
            });
        }

        function sendTG(msg) {
            const t = localStorage.getItem('tgToken'), c = localStorage.getItem('tgChatId');
            if(t && c) fetch(`https://api.telegram.org/bot${t}/sendMessage?chat_id=${c}&text=${encodeURIComponent(msg)}`);
        }

        function saveTGSettings() {
            const t = document.getElementById('tgToken').value, c = document.getElementById('tgChatId').value;
            localStorage.setItem('tgToken', t); localStorage.setItem('tgChatId', c);
            sendTG("✅ 連線成功！妳的匯率管家已準備就緒。"); alert("設定已儲存！");
        }

        function setAlert() {
            const target = parseFloat(document.getElementById('targetAlertPrice').value), from = document.getElementById('baseCurrency').value, to = document.getElementById('alertTargetCurrency').value;
            if(!target) return alert("請輸入價格");
            const cur = rates[to], dir = cur < target ? 'up' : 'down';
            alertHistory.push({ from, to, target, dir });
            localStorage.setItem('alertHistory', JSON.stringify(alertHistory));
            sendTG(`📍 監控啟動通知\n項目：${from} ➔ ${to}\n目標價：${target}\n目前匯率：${cur.toFixed(4)}\n狀態：監控中...📈`);
            renderHistory(); alert("監控已啟動！");
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (alertHistory.length === 0) { list.innerHTML = '<div class="text-gray-400 text-xs text-center py-2">目前沒有進行中的監控</div>'; return; }
            list.innerHTML = alertHistory.map((h, i) => `<div class="bg-white p-3 rounded-xl text-xs flex justify-between items-center border border-blue-100 shadow-sm"><div class="flex flex-col"><span class="font-bold text-blue-600">${h.from} ➔ ${h.to}</span><span class="text-gray-500">目標：${h.target} (${h.dir==='up'?'看漲📈':'看跌📉'})</span></div><button onclick="deleteH(${i})" class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-400 rounded-full hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-trash-alt"></i></button></div>`).join('');
        }
        
        window.deleteH = i => {
            const h = alertHistory[i];
            sendTG(`🗑️ 監控取消通知\n已停止：${h.from} ➔ ${h.to}\n目標：${h.target}`);
            alertHistory.splice(i, 1);
            localStorage.setItem('alertHistory', JSON.stringify(alertHistory));
            renderHistory();
        };

        function showChart(from, to) {
            document.getElementById('chartSection').classList.remove('hidden');
            document.getElementById('displayChartTitle').innerText = `${from} ➔ ${to} 趨勢預覽`;
            const ctx = document.getElementById('historyChart').getContext('2d');
            const dataValues = [], labels = [], base = rates[to];
            for(let i=7; i>=0; i--) { labels.push(`${i}天前`); dataValues.push(base * (1 + (Math.random()-0.5)*0.02)); }
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: `${from}➔${to}`, data: dataValues, borderColor: '#FF8A65', backgroundColor: 'rgba(255, 138, 101, 0.1)', fill: true, borderWidth: 4, tension: 0.4 }] }, options: { maintainAspectRatio: false } });
            document.getElementById('chartSection').scrollIntoView({ behavior: 'smooth' });
        }
        function closeChart() { document.getElementById('chartSection').classList.add('hidden'); }
        function checkAdminPassword() { if(prompt("🔐 密碼") === "8888") document.getElementById('tgSettings').classList.toggle('show'); }
        document.getElementById('baseAmount').oninput = updateUI;
        init();
    </script>
</body>
</html>
